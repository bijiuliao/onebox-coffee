[build]
  command = "npm install --prefix client && npm run build --prefix client"
  publish = "client/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run dev --prefix client"
  targetPort = 5173
  publish = "client/dist"
  functions = "netlify/functions"
  autoLaunch = false

# Client-side routes (e.g. /admin, /coffee/:id) have no matching static
# file, so fall back to the SPA shell. Function paths (/api/*) are matched
# before redirects and are unaffected by this.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
